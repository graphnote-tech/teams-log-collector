<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a5cb0"/>
      <stop offset="100%" stop-color="#414296"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Icon (chat bubble with download arrow), scaled and placed at left -->
  <g transform="translate(36 70) scale(1.1)">
    <!-- Bubble background -->
    <path
      d="M 0 0
         h 90
         a 14 14 0 0 1 14 14
         v 60
         a 14 14 0 0 1 -14 14
         h -46
         l -22 18
         v -18
         h -22
         a 14 14 0 0 1 -14 -14
         v -60
         a 14 14 0 0 1 14 -14 z"
      fill="#ffffff"/>
    <!-- Download arrow -->
    <g transform="translate(52 22)" fill="none" stroke="#414296" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <line x1="0" y1="0" x2="0" y2="38"/>
      <polyline points="-16,22 0,40 16,22"/>
      <line x1="-20" y1="52" x2="20" y2="52"/>
    </g>
  </g>

  <!-- Title -->
  <text x="200" y="115" fill="#ffffff" font-size="32" font-weight="700">Teams Log</text>
  <text x="200" y="152" fill="#ffffff" font-size="32" font-weight="700">Collector</text>

  <!-- Subtitle -->
  <text x="200" y="185" fill="#d6d6f0" font-size="14" font-weight="500">Export chats to JSON</text>
  <text x="200" y="205" fill="#d6d6f0" font-size="14" font-weight="500">No admin rights needed</text>
</svg>
